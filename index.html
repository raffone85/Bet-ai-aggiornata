<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Match Analyzer Pro DMP Clean</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0b0d12;--s1:#141720;--s2:#1a1e2a;--s3:#252a38;--brd:#2d3345;--brd2:#3a4055;
      --t1:#e8ecf4;--t2:#a0a8be;--t3:#6b7490;--grn:#4ade80;--grn2:#22c55e;--grn-bg:rgba(74,222,128,.1);
      --amb:#fbbf24;--amb-bg:rgba(251,191,36,.1);--red:#f87171;--red-bg:rgba(248,113,113,.08);
      --blu:#60a5fa;--blu-bg:rgba(96,165,250,.1);--cyn:#22d3ee;--cyn-bg:rgba(34,211,238,.08);
      --mag:#c084fc;--mag-bg:rgba(192,132,252,.08);--org:#fb923c;--org-bg:rgba(251,146,60,.08);
      --M:'IBM Plex Mono',monospace;--S:'DM Sans',sans-serif;
    }
    html{font-size:15px;background:var(--bg)}
    body{
      background:var(--bg);
      color:var(--t1);
      font-family:var(--S);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;
    }
    button,input,select{font:inherit}
    button{border:none;background:none;cursor:pointer}
    .app{max-width:780px;margin:0 auto;padding:16px 14px 110px;min-height:100vh}
    .hdr{padding:18px 0 10px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .hdr h1{font-size:1.35rem;font-weight:700;color:#fff;letter-spacing:-.4px}
    .hdr h1 span{color:var(--grn)}
    .hdr-info{font:500 .8rem var(--S);color:var(--t3)}

    .mtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
    .mtabs::-webkit-scrollbar{display:none}
    .mtab{
      padding:10px 16px;border-radius:24px;font:600 .85rem var(--S);color:var(--t2);
      border:1px solid var(--brd);background:var(--s1);white-space:nowrap;transition:.2s;flex-shrink:0
    }
    .mtab.active{background:var(--grn);color:var(--bg);border-color:var(--grn);font-weight:700}

    .panel{background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:12px;margin-bottom:12px}
    .upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
    .upload-card{
      position:relative;padding:14px;border:1.5px dashed var(--brd2);border-radius:12px;
      background:rgba(255,255,255,.01);min-height:96px;display:flex;flex-direction:column;justify-content:center;gap:6px
    }
    .upload-card input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .upload-lbl{font:700 .8rem var(--M);color:#fff}
    .upload-meta{font:500 .82rem var(--S);color:var(--t2);line-height:1.45}
    .upload-meta small{display:block;color:var(--t3)}
    .loaded{color:var(--grn);font-weight:700}
    .upload-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
    .pick-btn,.clear-btn{align-self:flex-start;padding:7px 10px;border-radius:8px;border:1px solid var(--brd);font:700 .75rem var(--M)}
    .pick-btn{background:var(--s2);color:var(--t1)}
    .clear-btn{background:var(--red-bg);border-color:rgba(248,113,113,.25);color:var(--red)}

    .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .search{
      flex:1;min-width:170px;padding:11px 14px;background:var(--s1);
      border:1.5px solid var(--brd);border-radius:10px;color:#fff;outline:none
    }
    .search::placeholder{color:var(--t3)}
    .select{
      appearance:none;background:var(--s1);padding:11px 34px 11px 12px;
      border:1.5px solid var(--brd);border-radius:10px;color:var(--t1);outline:none;min-height:44px
    }

    .stabs{display:flex;gap:4px;background:var(--s1);border-radius:10px;padding:4px;margin-bottom:12px;width:fit-content;flex-wrap:wrap}
    .stab{padding:8px 14px;border-radius:8px;font:600 .84rem var(--S);color:var(--t2)}
    .stab.active{background:var(--s3);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25)}

    .sec{display:flex;align-items:center;gap:10px;margin:18px 0 10px;padding-bottom:8px;border-bottom:1.5px solid var(--brd)}
    .tag{padding:5px 12px;border-radius:6px;font:700 .75rem var(--M);letter-spacing:.5px;text-transform:uppercase}
    .tag-m1{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(74,222,128,.2)}
    .tag-a{background:var(--blu-bg);color:var(--blu);border:1px solid rgba(96,165,250,.2)}
    .tag-b{background:var(--amb-bg);color:var(--amb);border:1px solid rgba(251,191,36,.2)}
    .tag-gen{background:var(--cyn-bg);color:var(--cyn);border:1px solid rgba(34,211,238,.2)}
    .tag-mg{background:var(--mag-bg);color:var(--mag);border:1px solid rgba(192,132,252,.2)}
    .tag-ia{background:var(--org-bg);color:var(--org);border:1px solid rgba(251,146,60,.2)}
    .tag-gz{background:rgba(96,165,250,.1);color:var(--blu);border:1px solid rgba(96,165,250,.2)}
    .tag-dmp{background:rgba(34,211,238,.1);color:var(--cyn);border:1px solid rgba(34,211,238,.2)}
    .sec-ct{font:500 .8rem var(--S);color:var(--t3)}

    .mlist{display:flex;flex-direction:column;gap:6px}
    .mrow{
      display:grid;grid-template-columns:56px 1fr auto;align-items:center;gap:10px;
      padding:12px 14px;background:var(--s1);border:1.5px solid transparent;border-radius:12px;
      cursor:pointer;transition:.15s;min-height:64px
    }
    .mrow:hover{border-color:var(--brd2);background:var(--s2)}
    .m-ora{font:600 .82rem var(--M);color:var(--t2)}
    .m-name{font:600 .95rem var(--S);color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .m-sub{font:.78rem var(--S);color:var(--t3);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
    .m-right{display:flex;align-items:center;gap:8px;flex-shrink:0;justify-content:flex-end}

    .m-ind{font:700 .82rem var(--M);padding:4px 10px;border-radius:6px}
    .ind-g{color:var(--grn);background:var(--grn-bg)}
    .ind-o{color:var(--amb);background:var(--amb-bg)}
    .ind-r{color:var(--t3);background:rgba(255,255,255,.04)}

    .badge{padding:3px 8px;border-radius:5px;font:700 .72rem var(--M);border:1px solid transparent;white-space:nowrap}
    .badge.good{background:var(--grn-bg);color:var(--grn);border-color:rgba(74,222,128,.2)}
    .badge.warn{background:var(--amb-bg);color:var(--amb);border-color:rgba(251,191,36,.2)}
    .badge.info{background:var(--blu-bg);color:var(--blu);border-color:rgba(96,165,250,.2)}
    .badge.alt{background:var(--mag-bg);color:var(--mag);border-color:rgba(192,132,252,.2)}
    .badge.neu{background:rgba(255,255,255,.05);color:var(--t2);border-color:rgba(255,255,255,.08)}

    .empty{text-align:center;padding:50px 20px;color:var(--t3);background:var(--s1);border:1px solid var(--brd);border-radius:14px}
    .empty .ico{font-size:2rem;margin-bottom:10px;opacity:.4}
    .empty p{font:500 .95rem var(--S);line-height:1.6;margin:0 auto;max-width:42ch}

    .ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
    .det{background:var(--s1);border:1.5px solid var(--brd);border-radius:20px 20px 0 0;max-width:620px;width:100%;max-height:88vh;overflow-y:auto;padding:22px 16px 28px}
    .det-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:16px}
    .det-t{font:700 1.1rem var(--S);color:#fff;line-height:1.35}
    .det-sub{font:.85rem var(--S);color:var(--t2);margin-top:4px}
    .det-x{
      width:36px;height:36px;border-radius:10px;border:1.5px solid var(--brd);background:transparent;
      color:var(--t2);font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0
    }

    .dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .dc{background:var(--bg);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,.03)}
    .dc-l{font:.7rem var(--S);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:3px}
    .dc-v{font:700 .98rem var(--M);word-break:break-word}
    .dc-v.g{color:var(--grn)}
    .dc-v.w{color:var(--amb)}
    .dc-v.n{color:var(--t1)}

    .note{margin-top:8px;color:var(--t3);font:.8rem var(--S);line-height:1.5}
    .footer-note{margin-top:10px;color:var(--t3);font:.78rem var(--S)}

    @media(max-width:600px){
      .mrow{grid-template-columns:48px 1fr auto;gap:8px;padding:11px 12px}
      .hdr{flex-direction:column;align-items:flex-start}
      .dg{grid-template-columns:1fr}
      .toolbar{flex-direction:column;align-items:stretch}
      .toolbar .search,.toolbar .select{width:100%}
      .det{padding:18px 14px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hdr">
      <div>
        <h1>Match <span>Analyzer</span> Pro</h1>
        <div class="hdr-info" id="hdrInfo">Versione pulita con supporto Data Mining Plus e senza storage locale</div>
      </div>
    </div>

    <div class="mtabs" id="mtabs">
      <button class="mtab active" data-m="ov05">Ov 0.5PT</button>
      <button class="mtab" data-m="gg">GG</button>
      <button class="mtab" data-m="o25">Ov 2.5</button>
      <button class="mtab" data-m="u25">U 2.5</button>
      <button class="mtab" data-m="mg13">MG 1-3</button>
      <button class="mtab" data-m="ia">Stats IA</button>
      <button class="mtab" data-m="players">Giocatori</button>
      <button class="mtab" data-m="gen">Generale</button>
      <button class="mtab" data-m="hub">Match Hub</button>
      <button class="mtab" data-m="quote">1X2 Value</button>
      <button class="mtab" data-m="gz">GZ Index</button>
      <button class="mtab" data-m="dmp">DMP</button>
    </div>

    <div class="panel">
      <div class="upload-grid" id="uploadGrid"></div>
      <div class="footer-note">
        File supportati: CSV con separatore ; oppure , . Il dataset Data Mining Plus usa intestazioni duplicate:
        il primo valore è la percentuale storica, il secondo è la quota reale.
      </div>
    </div>

    <div id="controls"></div>
    <div id="main"></div>
    <div id="detM"></div>
  </div>

  <script>
    const ST = {
      market:'ov05',
      sub:'all',
      iaCat:'all',
      plSub:'cards',
      league:'all',
      sortMode:'score',
      q:'',
      ov05:[],
      ggov25:[],
      mg13:[],
      ia:[],
      plCards:[],
      plShots:[],
      gz:[],
      dmp:[],
      quoteValore:[],
      det:null,
      detMarket:null,
      detSide:null
    };

    const DATASETS = [
      { key:'ov05', label:'Ov 0.5PT', hint:'IND Delta U5 COv0.5' },
      { key:'ggov25', label:'GG Ov/U 2.5', hint:'IGBc IGBo IGBt MGE Diff' },
      { key:'mg13', label:'MG 1-3', hint:'ICH ICA Var MGF' },
      { key:'ia', label:'Stats IA', hint:'TT TiP Corner Falli FG' },
      { key:'plCards', label:'Giocatori Cartellini', hint:'Tackle Falli Amm.' },
      { key:'plShots', label:'Giocatori Tiri/Gol', hint:'TT TiP Gol' },
      { key:'quoteValore', label:'Quote Valore 1X2', hint:'T1 TX T2 Spread' },
      { key:'dmp', label:'Data Mining Plus', hint:'NP + % storico + quota reale per 1X2/GG/OV15/OV25/UN35/OV0.5pt' },
      { key:'gz', label:'GZ Index', hint:'GZ IGB MGE Diff' }
    ];

    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[m]));
    }

    function timeVal(ora){
      const m = String(ora || '').match(/(\d{1,2}):(\d{2})/);
      return m ? parseInt(m[1],10)*60 + parseInt(m[2],10) : 9999;
    }

    function sortTime(a,b){ return timeVal(a.ora) - timeVal(b.ora); }

    function fmt(n,d=2){
      return n===null || n===undefined || Number.isNaN(n) ? 'ND' : Number(n).toFixed(d);
    }

    function normName(s){
      return String(s||'')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]+/g,' ')
        .replace(/\s+/g,' ')
        .trim();
    }

    function parseCsvLines(t){
      return String(t || '').replace(/\r/g,'').trim().replace(/^\uFEFF/,'').split('\n');
    }

    function splitCsvLine(line, sep){
      const out = [];
      let cur = '';
      let q = false;
      for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch === '"'){
          if(q && line[i+1] === '"'){ cur += '"'; i++; }
          else q = !q;
        }else if(ch === sep && !q){
          out.push(cur);
          cur = '';
        }else{
          cur += ch;
        }
      }
      out.push(cur);
      return out;
    }

    function parseMaybeNum(x){
      const s = String(x ?? '').replace(/%/g,'').replace(/\s+/g,'').replace(',', '.').trim();
      if(!s || s === '-' || s === '( - )') return null;
      const v = parseFloat(s);
      return Number.isNaN(v) ? null : v;
    }

    function parseNumLoose(x, def=0){
      const v = parseMaybeNum(x);
      return v===null ? def : v;
    }

    function parseIntLoose(x, def=0){
      const s = String(x ?? '').replace(/[^\d\-]/g,'').trim();
      if(!s) return def;
      const v = parseInt(s,10);
      return Number.isNaN(v) ? def : v;
    }

    function parsePctLoose(x, def=0){
      return parseNumLoose(x, def);
    }

    function filt(list){
      if(!ST.q) return list;
      const q = ST.q.toLowerCase();
      return list.filter(r =>
        [r.evento,r.nome,r.partita,r.squadra,r.match,r.lega,r.nazione]
          .filter(Boolean)
          .join(' ')
          .toLowerCase()
          .includes(q)
      );
    }

    function filtLeague(list,key){
      let r = filt(list);
      if(ST.league !== 'all' && key){
        r = r.filter(x => String(x[key] || '').trim() === ST.league);
      }
      return r;
    }

    function getLeagueOptions(data,key){
      return [...new Set(data.map(r => String(r[key] || '').trim()).filter(Boolean))]
        .sort((a,b) => a.localeCompare(b));
    }

    function affClass(a){
      return a>=4 ? 'good' : a>=3 ? 'warn' : 'neu';
    }

    function affNum(score, breaks){
      for(const [min,aff] of breaks){
        if(score >= min) return aff;
      }
      return 1;
    }

    function indB(v,t){
      if(v===null || v===undefined || v==='') return `<div class="m-ind ind-r">ND</div>`;
      if(t==='ov05') return `<div class="m-ind ${v>=320?'ind-g':v>=300?'ind-o':'ind-r'}">${v}</div>`;
      if(t==='igbt') return `<div class="m-ind ${v>=350?'ind-g':v>=300?'ind-o':'ind-r'}">${v}</div>`;
      return `<div class="m-ind ind-r">${v}</div>`;
    }

    function badge(txt, cls='neu'){
      return `<span class="badge ${cls}">${escapeHtml(txt)}</span>`;
    }

    function parseGeneric(t, map){
      const L = parseCsvLines(t);
      if(L.length < 2) return [];

      const sep = L[0].includes(';') ? ';' : ',';
      const s = x => String(x ?? '').replace(/^"|"$/g,'').trim();
      const h = splitCsvLine(L[0], sep).map(s);
      const hi = {};
      h.forEach((x,i) => hi[x] = i);

      const gf = (row,key) => row[hi[key]] ?? '';
      const rows = [];

      for(let i=1;i<L.length;i++){
        const f = splitCsvLine(L[i], sep).map(s);
        if(f.length < 3) continue;

        const obj = {};
        for(const [k,src] of Object.entries(map)){
          obj[k] = typeof src === 'function' ? src(gf,f) : gf(f,src);
        }
        rows.push(obj);
      }

      return rows;
    }

    function parseOv05(t){
      return parseGeneric(t, {
        ora:'ORA',
        evento:'EVENTO',
        rpt:'Rpt',
        ind:(g)=>parseIntLoose(g('IND'),999),
        qrOv05:(g)=>parseNumLoose(g('QROv0.5pt')),
        delta:(g)=>parseNumLoose(g('Delta')),
        diff:(g)=>parseNumLoose(g('Diff')),
        mge:(g)=>parseNumLoose(g('MGE')),
        cov05:(g)=>parseNumLoose(g('COv0.5')),
        oov05:(g)=>parseNumLoose(g('OOv0.5')),
        qrGG:(g)=>parseNumLoose(g('QrGG')),
        qrO25:(g)=>parseNumLoose(g('QrO25')),
        u5Raw:'U5CO',
        u5ctRaw:'U5CTCO',
        u5:(g)=>{ const p=String(g('U5CO')||'').split('-'); return parseIntLoose(p[0],0); },
        u5o:(g)=>{ const p=String(g('U5CO')||'').split('-'); return parseIntLoose(p[1],0); },
        u5ct:(g)=>{ const p=String(g('U5CTCO')||'').split('-'); return parseIntLoose(p[0],0); },
        u5cto:(g)=>{ const p=String(g('U5CTCO')||'').split('-'); return parseIntLoose(p[1],0); }
      });
    }

    function parseGGOv25(t){
      return parseGeneric(t, {
        ora:(g)=>g('ORA') || g('DATA EV.'),
        evento:'EVENTO',
        nazione:'NAZIONE',
        lega:(g)=>g('LEGA') || g('NAZIONE'),
        rpt:'RIS.',
        igbc:(g)=>parseIntLoose(g('IGBc')),
        igbo:(g)=>parseIntLoose(g('IGBo')),
        igbt:(g)=>parseIntLoose(g('IGBt')),
        mge:(g)=>parseNumLoose(g('MGE')),
        diff:(g)=>parseNumLoose(g('Diff')),
        pgg:(g)=>parseNumLoose(g('PGG')),
        s12:(g)=>parseIntLoose(g('S1-S2')),
        qov25:(g)=>parseNumLoose(g('qOv2.5'))
      });
    }

    function parseMG13(t){
      return parseGeneric(t, {
        ora:'ORA',
        evento:'EVENTO',
        rpt:'R',
        ich:(g)=>parseIntLoose(g('ICH')),
        varc:(g)=>parseNumLoose(g('VarC')),
        vu5c:(g)=>parseNumLoose(g('VU5C')),
        ritc:(g)=>parseIntLoose(g('RitC')),
        mgfc:(g)=>parseNumLoose(g('MGFC')),
        mgso:(g)=>parseNumLoose(g('MGSO')),
        q1:(g)=>parseNumLoose(g('Q1')),
        qo25:(g)=>parseNumLoose(g('QO25')),
        ica:(g)=>parseIntLoose(g('ICA')),
        varo:(g)=>parseNumLoose(g('VarO')),
        vu5o:(g)=>parseNumLoose(g('VU5O')),
        rito:(g)=>parseIntLoose(g('RitO')),
        mgfo:(g)=>parseNumLoose(g('MGFO')),
        mgsc:(g)=>parseNumLoose(g('MGSC')),
        q2:(g)=>parseNumLoose(g('Q2'))
      });
    }

    function parseIA(t){
      const rows = parseGeneric(t, {
        ora:(g)=>g('DATA EV.') || g('ORA'),
        nazione:'NAZIONE',
        lega:'LEGA',
        evento:'EVENTO',
        rpt:'RIS.',
        ttPred:'TT1X2',
        ttAff:(g)=>parseNumLoose(g('TTaff')),
        tipPred:'TIP1X2',
        tipAff:(g)=>parseNumLoose(g('TIPaff')),
        corPred:'Cor1X2',
        corAff:(g)=>parseNumLoose(g('CorAff')),
        falPred:'Fal1X2',
        falAff:(g)=>parseNumLoose(g('FalAff')),
        fgPred:'FG1X2',
        fgAff:(g)=>parseNumLoose(g('FGaff'))
      });

      return rows.map(r=>{
        const stats = [];
        if(r.ttPred) stats.push({key:'TT',label:'Tiri Totali',pred:r.ttPred,aff:r.ttAff});
        if(r.tipPred) stats.push({key:'TIP',label:'Tiri in Porta',pred:r.tipPred,aff:r.tipAff});
        if(r.corPred) stats.push({key:'COR',label:'Corner',pred:r.corPred,aff:r.corAff});
        if(r.falPred) stats.push({key:'FAL',label:'Falli',pred:r.falPred,aff:r.falAff});
        if(r.fgPred) stats.push({key:'FG',label:'Fuorigioco',pred:r.fgPred,aff:r.fgAff});
        r.stats = stats;
        r.maxAff = stats.length ? Math.max(...stats.map(x=>x.aff||0)) : 0;
        r.avgAff = stats.length ? stats.reduce((s,x)=>s+x.aff,0)/stats.length : 0;
        return r;
      });
    }

    function parsePlCards(t){
      return parseGeneric(t, {
        ora:'Ora',
        lega:'Campionato',
        partita:'Partita',
        nome:'Nome',
        squadra:'Squadra',
        pos:'Pos.',
        pres:(g)=>parseIntLoose(g('Presenze')),
        min:(g)=>parseNumLoose(g('Minuti')),

    function parseDMP(t){
      const L = parseCsvLines(t);
      if(L.length < 2) return [];

      const sep = L[0].includes(';') ? ';' : ',';
      const s = x => String(x ?? '').replace(/^"|"$/g,'').trim();
      const headers = splitCsvLine(L[0], sep).map(s);

      const dup = {};
      headers.forEach((h,i)=>{
        if(!dup[h]) dup[h] = [];
        dup[h].push(i);
      });

      const firstIdx = {};
      headers.forEach((h,i)=>{
        if(firstIdx[h] === undefined) firstIdx[h] = i;
      });

      const first = (row,key)=>{
        const i = firstIdx[key];
        return i===undefined ? '' : (row[i] ?? '');
      };

      const dupVal = (row,key,occ)=>{
        const arr = dup[key] || [];
        const i = arr[occ];
        return i===undefined ? '' : (row[i] ?? '');
      };

      const rows = [];

      for(let i=1;i<L.length;i++){
        const f = splitCsvLine(L[i], sep).map(s);
        if(f.length < 8) continue;

        const match = first(f,'Match');
        if(!match) continue;

        rows.push({
          ora:first(f,'Ora'),
          match,
          r:first(f,'R'),
          rpt:first(f,'Rpt'),
          np:parseIntLoose(first(f,'NP')),

          p1Pct:parsePctLoose(dupVal(f,'1',0)),
          p1Odd:parseMaybeNum(dupVal(f,'1',1)),

          xPct:parsePctLoose(dupVal(f,'X',0)),
          xOdd:parseMaybeNum(dupVal(f,'X',1)),

          p2Pct:parsePctLoose(dupVal(f,'2',0)),
          p2Odd:parseMaybeNum(dupVal(f,'2',1)),

          ggPct:parsePctLoose(dupVal(f,'GG',0)),
          ggOdd:parseMaybeNum(dupVal(f,'GG',1)),

          ov15Pct:parsePctLoose(dupVal(f,'OV15',0)),
          ov15Odd:parseMaybeNum(dupVal(f,'OV15',1)),

          ov25Pct:parsePctLoose(dupVal(f,'OV25',0)),
          ov25Odd:parseMaybeNum(dupVal(f,'OV25',1)),

          un35Pct:parsePctLoose(dupVal(f,'UN35',0)),
          un35Odd:parseMaybeNum(dupVal(f,'UN35',1)),

          ov05ptPct:parsePctLoose(dupVal(f,'OV0.5pt',0)),
          ov05ptOdd:parseMaybeNum(dupVal(f,'OV0.5pt',1)),

          mge:parseMaybeNum(first(f,'MGE')),
          diff:parseMaybeNum(first(f,'DIFF')),

          ic:parseMaybeNum(first(f,'IC')),
          rc:parseMaybeNum(first(f,'RC')),
          ro:parseMaybeNum(first(f,'RO')),

          igbc:parseMaybeNum(first(f,'IGBC')),
          igbo:parseMaybeNum(first(f,'IGBO')),
          re:first(f,'RE')
        });
      }

      return rows;
    }
        function scoreAmm(r){
      let s = 0;
      if(r.amm >= 0.4) s += 3;
      else if(r.amm >= 0.3) s += 2;
      else if(r.amm >= 0.2) s += 1;

      if(r.falli >= 2.5) s += 2.5;
      else if(r.falli >= 2) s += 2;
      else if(r.falli >= 1.5) s += 1;

      if(r.rit >= 5) s += 2;
      else if(r.rit >= 3) s += 1.5;
      else if(r.rit >= 1) s += .5;

      if(r.tackle >= 2) s += 1.5;
      else if(r.tackle >= 1) s += .75;

      if(r.min >= 70) s += .5;

      return { total:s, aff:affNum(s, [[7,5],[5,4],[3.5,3],[2,2]]) };
    }

    function scoreGol(r){
      let s = 0;
      if(r.gol >= 0.4) s += 3;
      else if(r.gol >= 0.25) s += 2;
      else if(r.gol >= 0.15) s += 1;

      if(r.tiriPorta >= 2) s += 2.5;
      else if(r.tiriPorta >= 1.5) s += 1.5;
      else if(r.tiriPorta >= 1) s += 1;

      if(r.rit >= 5) s += 2;
      else if(r.rit >= 3) s += 1.5;
      else if(r.rit >= 1) s += .5;

      if(r.tiriTot >= 3) s += 1.5;
      else if(r.tiriTot >= 2) s += 1;

      if(r.min >= 70) s += .5;

      return { total:s, aff:affNum(s, [[7,5],[5,4],[3.5,3],[2,2]]) };
    }

    function ov05M1(r){
      return r.ind <= 320 && r.delta <= -20 && r.diff <= 0;
    }

    function ov05AFF(r){
      let s = 0;

      if(r.ind <= 280) s += 2;
      else if(r.ind < 320) s += 1.5;
      else if(r.ind < 330) s += 1;

      if(r.delta <= -20) s += 2;
      else if(r.delta <= -5) s += 1;
      else if(r.delta <= 0) s += .5;

      if(r.diff <= 0) s += 1.5;
      else if(r.diff <= .2) s += .5;

      if(r.mge >= 3.2) s += 1.5;
      else if(r.mge >= 2.8) s += 1;
      else if(r.mge >= 2.5) s += .5;

      if(r.cov05 >= 75) s += .75;
      if(r.oov05 >= 75) s += .75;
      if(r.qrGG > 0 && r.qrO25 > 0 && r.qrGG < r.qrO25) s += .75;
      if(r.qrOv05 >= 1.15 && r.qrOv05 <= 1.30) s += .75;

      return { total:s, aff:affNum(s, [[8.5,5],[7,4],[5.5,3],[4,2]]) };
    }

    function ggM1(r){
      return r.igbc >= 150 && r.igbo >= 150 && r.s12 <= 150 && r.pgg >= 55;
    }

    function ggAFF(r){
      let s = 0;

      if(r.igbc >= 200) s += 2;
      else if(r.igbc >= 150) s += 1.5;
      else if(r.igbc >= 100) s += .75;

      if(r.igbo >= 200) s += 2;
      else if(r.igbo >= 150) s += 1.5;
      else if(r.igbo >= 100) s += .75;

      if(r.s12 <= 80) s += 2;
      else if(r.s12 <= 150) s += 1.5;
      else if(r.s12 <= 300) s += .75;

      if(r.pgg >= 65) s += 1.5;
      else if(r.pgg >= 55) s += 1;
      else if(r.pgg >= 45) s += .5;

      if(r.diff <= -.5) s += 1.5;
      else if(r.diff <= 0) s += .75;

      if(r.mge >= 3) s += 1.5;
      else if(r.mge >= 2.5) s += .75;

      if(r.qov25 > 0 && r.qov25 <= 1.7) s += .75;
      else if(r.qov25 <= 2) s += .25;

      return { total:s, aff:affNum(s, [[8.5,5],[7,4],[5.5,3],[4,2]]) };
    }

    function o25M1(r){
      return r.igbt >= 300 && r.mge >= 3 && r.diff <= 0;
    }

    function o25AFF(r){
      let s = 0;

      if(r.igbt >= 400) s += 2.5;
      else if(r.igbt >= 350) s += 2;
      else if(r.igbt >= 300) s += 1.5;
      else if(r.igbt >= 250) s += .75;

      if(r.mge >= 3.5) s += 2;
      else if(r.mge >= 3) s += 1.5;
      else if(r.mge >= 2.5) s += .5;

      if(r.diff <= -1) s += 2;
      else if(r.diff <= -.5) s += 1.5;
      else if(r.diff <= 0) s += .75;
      else if(r.diff <= .3) s += .25;

      if((r.igbc >= 400 && r.igbo >= 400) || r.s12 <= 100) s += 1.5;
      else if(r.s12 <= 200) s += 1;
      else if(r.s12 <= 350) s += .5;

      if(r.pgg >= 65) s += 1;
      else if(r.pgg >= 55) s += .5;
      else if(r.pgg >= 45) s += .25;

      if(r.qov25 > 0 && r.qov25 <= 1.45) s += 1.5;
      else if(r.qov25 <= 1.65) s += 1;
      else if(r.qov25 <= 1.85) s += .5;

      return { total:s, aff:affNum(s, [[8.5,5],[7,4],[5.5,3],[4,2]]) };
    }

    function u25M1(r){
      return r.diff >= 1.5 && r.mge > 0 && r.mge <= 3;
    }

    function u25AFF(r){
      let s = 0;

      if(r.diff >= 2) s += 2.5;
      else if(r.diff >= 1.5) s += 2;
      else if(r.diff >= 1) s += 1;
      else if(r.diff >= .5) s += .5;

      if(r.mge > 0 && r.mge < 2) s += 2.5;
      else if(r.mge < 2.5) s += 2;
      else if(r.mge < 3) s += 1;

      if(r.qov25 >= 2.3) s += 1.5;
      else if(r.qov25 >= 2) s += 1;
      else if(r.qov25 >= 1.8) s += .5;

      if(r.pgg > 0 && r.pgg <= 35) s += 1.5;
      else if(r.pgg <= 45) s += 1;
      else if(r.pgg <= 55) s += .5;

      if(r.igbt <= 200) s += 1.5;
      else if(r.igbt <= 250) s += 1;
      else if(r.igbt <= 300) s += .5;

      if(r.s12 >= 400) s += 1;
      else if(r.s12 >= 200) s += .5;

      const o = o25AFF(r);
      if(o.aff === 1) s += 1.5;
      else if(o.aff === 2) s += .75;

      return { total:s, aff:affNum(s, [[9,5],[7.5,4],[6,3],[4.5,2]]) };
    }

    function mg13M1C(r){
      return r.ich <= 350 && r.varc >= 30;
    }

    function mg13M1O(r){
      return r.ica <= 350 && r.varo >= 30;
    }

    function mg13AFFC(r){
      let s = 0;

      if(r.ich <= 300) s += 2.5;
      else if(r.ich <= 320) s += 2;
      else if(r.ich <= 350) s += 1.5;
      else if(r.ich <= 400) s += .5;

      if(r.varc >= 40) s += 2;
      else if(r.varc >= 30) s += 1.5;
      else if(r.varc >= 20) s += .5;

      if(r.mgfc >= 1.5 && r.mgfc <= 2.5) s += 1.5;
      else if(r.mgfc >= 1 && r.mgfc < 1.5) s += 1;
      else if(r.mgfc > 2.5 && r.mgfc <= 3) s += .75;

      if(r.vu5c >= 60) s += 1;
      else if(r.vu5c >= 40) s += .5;

      if(r.q1 >= 1.5 && r.q1 <= 2.5) s += 1;
      else if((r.q1 >= 1.2 && r.q1 < 1.5) || (r.q1 > 2.5 && r.q1 <= 4)) s += .5;

      if(r.mgso >= 1.5) s += 1;
      else if(r.mgso >= 1) s += .5;

      if(r.ritc >= 3) s += .75;
      else if(r.ritc >= 1) s += .25;

      return { total:s, aff:affNum(s, [[8,5],[6.5,4],[5,3],[3.5,2]]) };
    }

    function mg13AFFO(r){
      let s = 0;

      if(r.ica <= 300) s += 2.5;
      else if(r.ica <= 320) s += 2;
      else if(r.ica <= 350) s += 1.5;
      else if(r.ica <= 400) s += .5;

      if(r.varo >= 40) s += 2;
      else if(r.varo >= 30) s += 1.5;
      else if(r.varo >= 20) s += .5;

      if(r.mgfo >= 1.5 && r.mgfo <= 2.5) s += 1.5;
      else if(r.mgfo >= 1 && r.mgfo < 1.5) s += 1;
      else if(r.mgfo > 2.5 && r.mgfo <= 3) s += .75;

      if(r.vu5o >= 60) s += 1;
      else if(r.vu5o >= 40) s += .5;

      if(r.q2 >= 2 && r.q2 <= 4) s += 1;
      else if(r.q2 > 4 && r.q2 <= 6) s += .5;

      if(r.mgsc >= 1.5) s += 1;
      else if(r.mgsc >= 1) s += .5;

      if(r.rito >= 3) s += .75;
      else if(r.rito >= 1) s += .25;

      return { total:s, aff:affNum(s, [[8,5],[6.5,4],[5,3],[3.5,2]]) };
    }

    function analyzeQuoteMatch(r){
      const value1 = r.r1 > 1.01 && r.r1 <= 3 && r.dm1 > 0 && (r.r1 - r.dm1) >= 0.15;
      const valueX = r.rx > 1.01 && r.rx <= 4.5 && r.dmx > 0 && (r.rx - r.dmx) >= 0.15;
      const value2 = r.r2 > 1.01 && r.r2 <= 5 && r.dm2 > 0 && (r.r2 - r.dm2) >= 0.15;

      let golSide = null;
      if(value1 && !value2) golSide = 'casa';
      else if(value2 && !value1) golSide = 'ospite';
      else if(value1 && value2) golSide = 'entrambe';
      else if(valueX) golSide = 'pareggio';

      const score =
        (value1 ? (r.r1 - r.dm1) : 0) +
        (valueX ? (r.rx - r.dmx) : 0) +
        (value2 ? (r.r2 - r.dm2) : 0);

      return { value1, valueX, value2, golSide, score };
    }

    function gzProbability(gz){
      if(gz === null) return { label:'ND', desc:'Dato mancante', type:'neutral' };
      if(gz <= -1800) return { label:'U2.5 64%', desc:'Under 2.5 al 64%', type:'under' };
      if(gz <= -1200) return { label:'U3.5 81%', desc:'Under 3.5 al 81%', type:'under' };
      if(gz >= 5000) return { label:'Ov2.5 64%', desc:'Over 2.5 al 64%', type:'over' };
      if(gz >= 1000) return { label:'Ov1.5 80%', desc:'Over 1.5 al 80%', type:'over' };
      if(gz >= -200 && gz <= 200) return { label:'Ov0.5 95%', desc:'Over 0.5 al 95%', type:'over' };
      return { label:'Normale', desc:'Nessuna indicazione forte', type:'neutral' };
    }

    function getGzAlignment(evento, requiredType){
      const g = ST.gz.find(x => normName(x.evento) === normName(evento));
      if(!g) return null;
      const prob = gzProbability(g.gz);
      return {
        gz:g.gz,
        prob,
        aligned:(requiredType === 'over' && prob.type === 'over') || (requiredType === 'under' && prob.type === 'under')
      };
    }

    function getQuoteAlignment(evento){
      const q = ST.quoteValore.find(x => normName(x.match) === normName(evento));
      if(!q) return null;
      return analyzeQuoteMatch(q);
    }

    function sortRows(rows,key='score'){
      const arr = [...rows];
      if(ST.sortMode === 'time') return arr.sort(sortTime);
      return arr.sort((a,b) => ((b[key] || 0) - (a[key] || 0)) || sortTime(a,b));
    }

    function getOv05Rows(){
      let rows = ST.ov05.map(r=>{
        const a = ov05AFF(r);
        return {
          ...r,
          score:a.total,
          aff:a.aff,
          marketLabel:'Ov 0.5PT',
          m1:ov05M1(r),
          gzAlign:getGzAlignment(r.evento,'over'),
          qvAlign:getQuoteAlignment(r.evento)
        };
      });
      if(ST.sub === 'm1') rows = rows.filter(r => r.m1);
      return sortRows(filt(rows),'score');
    }

    function getGgRows(){

        };

    function getU25Rows(){
      let rows = ST.ggov25.map(r=>{
        const a = u25AFF(r);
        return {
          ...r,
          score:a.total,
          aff:a.aff,

        };
      });
      if(ST.sub === 'm1') rows = rows.filter(r => r.m1);

    function getMgRows(){
      let rows = ST.mg13.map(r=>{
        const house = mg13AFFC(r);
        const away = mg13AFFO(r);
        return {
          ...r,
          house,
          away,
          score:Math.max(house.total, away.total),
          aff:Math.max(house.aff, away.aff),
          side:house.total >= away.total ? 'casa' : 'ospite',
          m1c:mg13M1C(r),
          m1o:mg13M1O(r)
        };
      });

      if(ST.sub === 'm1') rows = rows.filter(r => r.m1c || r.m1o);
      if(ST.sub === 'casa') rows = rows.map(r => ({ ...r, score:r.house.total, aff:r.house.aff, side:'casa' }));
      if(ST.sub === 'ospite') rows = rows.map(r => ({ ...r, score:r.away.total, aff:r.away.aff, side:'ospite' }));

      return sortRows(filt(rows),'score');
    }

    function getIaRows(){
      let rows = ST.ia.map(r => ({
        ...r,
        score:r.avgAff,
        aff:r.maxAff >= 4 ? 5 : r.maxAff >= 3 ? 4 : r.maxAff >= 2.5 ? 3 : r.maxAff >= 1.5 ? 2 : 1
      }));

      if(ST.iaCat !== 'all') rows = rows.filter(r => r.stats.some(s => s.key === ST.iaCat));
      rows = filtLeague(rows,'lega');
      return sortRows(rows,'score');
    }

    function getPlayerRows(){
      const base = ST.plSub === 'cards' ? ST.plCards : ST.plShots;
      const rows = base.map(r=>{
        const sc = ST.plSub === 'cards' ? scoreAmm(r) : scoreGol(r);
        return {
          ...r,
          score:sc.total,
          aff:sc.aff,
          marketLabel:ST.plSub === 'cards' ? 'Cartellini' : 'Gol/Tiri'
        };
      });

      return sortRows(filtLeague(rows,'lega'),'score');
    }

    function getQuoteRows(){
      return sortRows(
        filt(
          ST.quoteValore
            .map(r => ({ ...r, ...analyzeQuoteMatch(r) }))
            .filter(r => r.match)
        ),
        'score'
      );
    }

    function getGzRows(){
      return [...filtLeague(
        ST.gz.map(r => ({
          ...r,
          prob:gzProbability(r.gz),
          score:Math.abs(r.gz || 0)
        })),
        'lega'
      )].sort((a,b) => (Math.abs(b.gz || 0) - Math.abs(a.gz || 0)) || sortTime(a,b));
    }

    function getDmpRows(){
      return sortRows(
        filt(
          ST.dmp.map(r=>{
            const score = Math.max(
              r.ov25Pct || 0,
              r.ggPct || 0,
              r.ov05ptPct || 0,
              r.p1Pct || 0,
              r.xPct || 0,
              r.p2Pct || 0
            );
            const aff = score >= 72 ? 5 : score >= 64 ? 4 : score >= 56 ? 3 : score >= 48 ? 2 : 1;
            return { ...r, score, aff };
          })
        ),
        'score'
      );
    }

    function buildHubRows(){
      const map = {};

      const ensure = (name,ora)=>{
        const k = normName(name);
        if(!k) return null;
        if(!map[k]){
          map[k] = {
            evento:name,
            ora,
            ov05:null,
            gg:null,
            o25:null,
            u25:null,
            mg13:null,
            ia:null,
            gz:null,
            qv:null
          };
        }
        return map[k];
      };

      getOv05Rows().forEach(r=>{ const m=ensure(r.evento,r.ora); if(m && !m.ov05) m.ov05=r; });
      getGgRows().forEach(r=>{ const m=ensure(r.evento,r.ora); if(m && !m.gg) m.gg=r; });
      getO25Rows().forEach(r=>{ const m=ensure(r.evento,r.ora); if(m && !m.o25) m.o25=r; });
      getU25Rows().forEach(r=>{ const m=ensure(r.evento,r.ora); if(m && !m.u25) m.u25=r; });
      getMgRows().forEach(r=>{ const m=ensure(r.evento,r.ora); if(m && !m.mg13) m.mg13=r; });
      getIaRows().forEach(r=>{ const m=ensure(r.evento,r.ora); if(m && !m.ia) m.ia=r; });

      ST.gz.forEach(r=>{
        const m = ensure(r.evento,r.ora);
        if(m && !m.gz) m.gz = { ...r, prob:gzProbability(r.gz) };
      });

      ST.quoteValore.forEach(r=>{
        const m = ensure(r.match,r.ora);
        if(m && !m.qv) m.qv = { ...r, ...analyzeQuoteMatch(r) };
      });

      return Object.values(map).map(r=>{
        const coverage = [r.ov05,r.gg,r.o25,r.u25,r.mg13,r.ia,r.gz,r.qv].filter(Boolean).length;
        const conflicts =
          (r.o25 && r.gz && r.gz.prob.type === 'under' ? 1 : 0) +
          (r.u25 && r.gz && r.gz.prob.type === 'over' ? 1 : 0) +
          (r.gg && r.qv && r.qv.golSide === 'pareggio' ? 1 : 0);

        let market = 'Nessuna';
        let score = 0;
        let aff = 1;
        let alt = null;
        let reason = 'Copertura insufficiente';
        let risk = conflicts >= 2 ? 'Alto' : conflicts === 1 ? 'Medio' : 'Basso';

        if(r.o25 && r.o25.aff >= 4){
          market = 'Ov 2.5';
          score = r.o25.score + (r.gz && r.gz.prob.type === 'over' ? 1 : 0);
          aff = Math.min(5, r.o25.aff + (r.gz && r.gz.prob.type === 'over' ? 1 : 0));
          reason = 'Linea over con convergenza statistica';
          if(r.gg && r.gg.aff >= 4) alt = { market:'GG' };
        }else if(r.gg && r.gg.aff >= 4){
          market = 'GG';
          score = r.gg.score + (r.gz && r.gz.prob.type === 'over' ? 1 : 0);
          aff = Math.min(5, r.gg.aff);
          reason = 'Segnale GG forte';
          if(r.o25 && r.o25.aff >= 3) alt = { market:'Ov 2.5' };
        }else if(r.u25 && r.u25.aff >= 4){
          market = 'U 2.5';
          score = r.u25.score + (r.gz && r.gz.prob.type === 'under' ? 1 : 0);
          aff = Math.min(5, r.u25.aff);
          reason = 'Profilo da under';
          if(r.ov05 && r.ov05.aff >= 4) alt = { market:'Ov 0.5 PT' };
        }else if(r.ov05 && r.ov05.aff >= 4){
          market = 'Ov 0.5 PT';
          score = r.ov05.score;
          aff = r.ov05.aff;
          reason = 'Linea prudente primo tempo';
          if(r.gg && r.gg.aff >= 3) alt = { market:'GG' };
        }else if(r.mg13 && r.mg13.aff >= 4){
          market = r.mg13.side === 'ospite' ? 'MG 1-3 Ospite' : 'MG 1-3 Casa';
          score = r.mg13.score;
          aff = r.mg13.aff;
          reason = 'Lettura multigol orientata';
        }

        return {
          ...r,
          market,
          score,
          aff,
          alt,
          coverage,
          conflicts,
          advice:{
            main: market !== 'Nessuna' ? { market } : null,
            alt,
            risk,
            summary:`${market} | copertura ${coverage}/8 | ${reason}`
          }
        };
      }).sort((a,b)=>(b.score-a.score)||sortTime(a,b));
    }

            ${card('PGG', fmt(r.pgg,0)+'%', 'n')}
            ${card('S1-S2', r.s12, 'n')}
            ${card('qOv2.5', fmt(r.qov25), 'n')}
            ${card('Ris.', r.rpt || 'ND', 'n')}
            ${card('Lega', r.lega || 'ND', 'n')}
            ${card('GZ Align', r.gzAlign ? r.gzAlign.prob.label : 'ND', r.gzAlign?.aligned ? 'g' : 'w')}
            ${card('AFF', r.aff + '/5', r.aff>=4?'g':'w')}
          </div>
        `;
      }

      if(market === 'mg13'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.evento)}</div>
              <div class="det-sub">${escapeHtml(r.ora || '-')} • MG 1-3</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${card('ICH', r.ich, r.ich<=350?'g':'w')}
            ${card('VarC', fmt(r.varc), r.varc>=30?'g':'w')}
            ${card('MGFC', fmt(r.mgfc), 'n')}
            ${card('VU5C', fmt(r.vu5c), 'n')}
            ${card('Q1', fmt(r.q1), 'n')}
            ${card('MGSO', fmt(r.mgso), 'n')}
            ${card('ICA', r.ica, r.ica<=350?'g':'w')}
            ${card('VarO', fmt(r.varo), r.varo>=30?'g':'w')}
            ${card('MGFO', fmt(r.mgfo), 'n')}
            ${card('VU5O', fmt(r.vu5o), 'n')}
            ${card('Q2', fmt(r.q2), 'n')}
            ${card('AFF', r.aff + '/5', r.aff>=4?'g':'w')}
          </div>
          <div class="note">Lato prevalente: ${escapeHtml(r.side || 'ND')} • Casa ${fmt(r.house.total)} | Ospite ${fmt(r.away.total)}</div>
        `;
      }

      if(market === 'ia'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.evento)}</div>
              <div class="det-sub">${escapeHtml(r.ora || '-')} • Stats IA</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${r.stats.map(s=>card(s.label, `${s.pred} • ${fmt(s.aff,1)}`, s.aff>=3?'g':'n')).join('')}
          </div>
          <div class="note">Lega: ${escapeHtml(r.lega || 'ND')} • Max Aff: ${fmt(r.maxAff,1)} • Media: ${fmt(r.avgAff,2)}</div>
        `;
      }

      if(market === 'players'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.nome)} • ${escapeHtml(r.squadra)}</div>
              <div class="det-sub">${escapeHtml(r.partita || '-') } • ${escapeHtml(r.ora || '-')}</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${card('Pos.', r.pos || 'ND', 'n')}
            ${card('Presenze', r.pres, 'n')}
            ${card('Minuti', fmt(r.min), 'n')}
            ${ST.plSub === 'cards'
              ? `${card('Tackle', fmt(r.tackle), 'n')}
                 ${card('Falli', fmt(r.falli), 'n')}
                 ${card('Ammonizioni', fmt(r.amm), 'g')}
                 ${card('Espulsioni', fmt(r.esp), 'n')}
                 ${card('Rit.', r.rit, 'n')}`
              : `${card('Tiri Totali', fmt(r.tiriTot), 'n')}
                 ${card('Tiri in porta', fmt(r.tiriPorta), 'g')}
                 ${card('Gol', fmt(r.gol), 'g')}
                 ${card('Rit.', r.rit, 'n')}`
            }
            ${card('AFF', r.aff + '/5', r.aff>=4?'g':'w')}
          </div>
        `;
      }

      if(market === 'gen'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.evento)}</div>
              <div class="det-sub">${escapeHtml(r.market)} • ${escapeHtml(r.ora || '-')}</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${card('Mercato', r.market, 'g')}
            ${card('Score', fmt(r.score), 'n')}
            ${card('AFF', r.aff + '/5', r.aff>=4?'g':'w')}
            ${card('Nota', r.advice, 'n')}
          </div>
        `;
      }

      if(market === 'hub'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.evento)}</div>
              <div class="det-sub">${escapeHtml(r.ora || '-')} • Match Hub</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${card('Pronostico', r.market, r.aff>=4?'g':'w')}
            ${card('Score', fmt(r.score), 'n')}
            ${card('Copertura', r.coverage + '/8', 'n')}
            ${card('Rischio', r.advice?.risk || 'ND', 'w')}
            ${card('Ov 0.5PT', r.ov05 ? (r.ov05.aff + '/5') : 'ND', 'n')}
            ${card('GG', r.gg ? (r.gg.aff + '/5') : 'ND', 'n')}
            ${card('Ov 2.5', r.o25 ? (r.o25.aff + '/5') : 'ND', 'n')}
            ${card('U 2.5', r.u25 ? (r.u25.aff + '/5') : 'ND', 'n')}
            ${card('MG 1-3', r.mg13 ? (r.mg13.aff + '/5') : 'ND', 'n')}
            ${card('Stats IA', r.ia ? fmt(r.ia.score,2) : 'ND', 'n')}
            ${card('GZ', r.gz ? r.gz.prob.label : 'ND', r.gz?.prob?.type==='over'?'g':r.gz?.prob?.type==='under'?'w':'n')}
            ${card('1X2 Value', r.qv ? (r.qv.golSide || 'ND') : 'ND', 'n')}
          </div>
          <div class="note">${escapeHtml(r.advice?.summary || '')}</div>
        `;
      }

      if(market === 'quote'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.match)}</div>
              <div class="det-sub">${escapeHtml(r.ora || '-')} • 1X2 Value</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${card('1 Reale', fmt(r.r1), 'n')}
            ${card('1 DM', fmt(r.dm1), 'n')}
            ${card('X Reale', fmt(r.rx), 'n')}
            ${card('X DM', fmt(r.dmx), 'n')}
            ${card('2 Reale', fmt(r.r2), 'n')}
            ${card('2 DM', fmt(r.dm2), 'n')}
            ${card('Value 1', r.value1 ? 'Sì' : 'No', r.value1?'g':'w')}
            ${card('Value X', r.valueX ? 'Sì' : 'No', r.valueX?'g':'w')}
            ${card('Value 2', r.value2 ? 'Sì' : 'No', r.value2?'g':'w')}
            ${card('Gol Side', r.golSide || 'ND', 'n')}
            ${card('Score', fmt(r.score), 'g')}
            ${card('NP', r.np, 'n')}
          </div>
        `;
      }

      if(market === 'gz'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.evento)}</div>
              <div class="det-sub">${escapeHtml(r.ora || '-')} • GZ Index</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${card('GZ', r.gz, Math.abs(r.gz)>=1000?'g':'w')}
            ${card('Prob.', r.prob.label, r.prob.type==='over'?'g':r.prob.type==='under'?'w':'n')}
            ${card('GZha', fmt(r.gzha), 'n')}
            ${card('IGBc', fmt(r.igbc), 'n')}
            ${card('IGBo', fmt(r.igbo), 'n')}
            ${card('IGBt', fmt(r.igbt), 'n')}
            ${card('MGE', fmt(r.mge), 'n')}
            ${card('Diff', fmt(r.diff), 'n')}
            ${card('Ris.', r.ris || 'ND', 'n')}
            ${card('Lega', r.lega || 'ND', 'n')}
          </div>
          <div class="note">${escapeHtml(r.prob.desc)}</div>
        `;
      }

      if(market === 'dmp'){
        return `
          <div class="det-top">
            <div>
              <div class="det-t">${escapeHtml(r.match)}</div>
              <div class="det-sub">${escapeHtml(r.ora || '-')} • Data Mining Plus</div>
            </div>
            <button class="det-x" data-close-det>×</button>
          </div>
          <div class="dg">
            ${card('1 %', fmt(r.p1Pct,0)+'%', r.p1Pct>=60?'g':'n')}
            ${card('1 Quota', fmt(r.p1Odd), 'n')}
            ${card('X %', fmt(r.xPct,0)+'%', 'n')}
            ${card('X Quota', fmt(r.xOdd), 'n')}
            ${card('2 %', fmt(r.p2Pct,0)+'%', r.p2Pct>=60?'g':'n')}
            ${card('2 Quota', fmt(r.p2Odd), 'n')}
            ${card('GG %', fmt(r.ggPct,0)+'%', r.ggPct>=60?'g':'n')}
            ${card('GG Quota', fmt(r.ggOdd), 'n')}
            ${card('OV15 %', fmt(r.ov15Pct,0)+'%', 'n')}
            ${card('OV15 Quota', fmt(r.ov15Odd), 'n')}
            ${card('OV25 %', fmt(r.ov25Pct,0)+'%', r.ov25Pct>=60?'g':'n')}
            ${card('OV25 Quota', fmt(r.ov25Odd), 'n')}
            ${card('UN35 %', fmt(r.un35Pct,0)+'%', 'n')}
            ${card('UN35 Quota', fmt(r.un35Odd), 'n')}
            ${card('OV0.5PT %', fmt(r.ov05ptPct,0)+'%', r.ov05ptPct>=60?'g':'n')}
            ${card('OV0.5PT Quota', fmt(r.ov05ptOdd), 'n')}
            ${card('MGE', fmt(r.mge), 'n')}
            ${card('DIFF', fmt(r.diff), 'n')}
            ${card('IC', fmt(r.ic), 'n')}
            ${card('RC', fmt(r.rc), 'n')}
            ${card('RO', fmt(r.ro), 'n')}
            ${card('IGBC', fmt(r.igbc), 'n')}
            ${card('IGBO', fmt(r.igbo), 'n')}
            ${card('AFF', r.aff + '/5', r.aff>=4?'g':'w')}
          </div>
          <div class="note">RPT: ${escapeHtml(r.rpt || 'ND')} • RE: ${escapeHtml(r.re || 'ND')} • NP: ${escapeHtml(String(r.np ?? 'ND'))}</div>
        `;
      }

      return '';
    }

    function openDetail(market, idx){
      const rows = currentRows();
      const r = rows[idx];
      if(!r) return;

      ST.det = r;
      ST.detMarket = market;

      const detM = document.getElementById('detM');
      detM.innerHTML = `
        <div class="ov" id="ovWrap">
          <div class="det">
            ${detailHtml(market, r)}
          </div>
        </div>
      `;

      detM.querySelector('[data-close-det]')?.addEventListener('click', closeDetail);
      detM.querySelector('#ovWrap')?.addEventListener('click', e=>{
        if(e.target.id === 'ovWrap') closeDetail();
      });
    }

    function closeDetail(){
      document.getElementById('detM').innerHTML = '';
      ST.det = null;
      ST.detMarket = null;
    }

    function bindRowOpen(){
      document.querySelectorAll('[data-open]').forEach(el=>{
        el.onclick = ()=>{
          const [market, idx] = el.getAttribute('data-open').split(':');
          openDetail(market, Number(idx));
        };
      });
    }

    function bindControlEvents(){
      document.querySelectorAll('[data-sub]').forEach(b=>{
        b.onclick = ()=>{
          ST.sub = b.getAttribute('data-sub');
          refresh();
        };
      });

      document.querySelectorAll('[data-sort]').forEach(b=>{
        b.onclick = ()=>{
          ST.sortMode = b.getAttribute('data-sort');
          refresh();
        };
      });

      document.querySelectorAll('[data-iacat]').forEach(b=>{
        b.onclick = ()=>{
          ST.iaCat = b.getAttribute('data-iacat');
          refresh();
        };
      });

      document.querySelectorAll('[data-plsub]').forEach(b=>{
        b.onclick = ()=>{
          ST.plSub = b.getAttribute('data-plsub');
          refresh();
        };
      });

      const s = document.getElementById('searchInp');
      if(s){
        s.oninput = e=>{
          ST.q = e.target.value.trim();
          renderRows();
        };
      }

      const l = document.getElementById('leagueSel');
      if(l){
        l.onchange = e=>{
          ST.league = e.target.value;
          renderRows();
        };
      }
    }

    function parseByTarget(target, text){
      if(target === 'ov05') return parseOv05(text);
      if(target === 'ggov25') return parseGGOv25(text);
      if(target === 'mg13') return parseMG13(text);
      if(target === 'ia') return parseIA(text);
      if(target === 'plCards') return parsePlCards(text);
      if(target === 'plShots') return parsePlShots(text);
      if(target === 'quoteValore') return parseQuoteValore(text);
      if(target === 'gz') return parseGZ(text);
      if(target === 'dmp') return parseDMP(text);
      return [];
    }

    function bindUploadInputs(){
      document.querySelectorAll('[data-pick]').forEach(btn=>{
        btn.onclick = ()=>{
          const id = btn.getAttribute('data-pick');
          document.getElementById(id)?.click();
        };
      });

      document.querySelectorAll('[data-clear]').forEach(btn=>{
        btn.onclick = ()=>{
          const key = btn.getAttribute('data-clear');
          ST[key] = [];
          refresh();
        };
      });

      document.querySelectorAll('#uploadGrid input[type="file"]').forEach(inp=>{
        inp.onchange = async e=>{
          const file = e.target.files?.[0];
          const target = inp.getAttribute('data-target');
          if(!file || !target) return;

          try{
            const text = await file.text();
            ST[target] = parseByTarget(target, text);
            refresh();
          }catch(err){
            alert('Errore durante la lettura del file CSV.');
            console.error(err);
          }finally{
            inp.value = '';
          }
        };
      });
    }

    function bindMarketTabs(){
      document.querySelectorAll('.mtab').forEach(btn=>{
        btn.onclick = ()=>{
          document.querySelectorAll('.mtab').forEach(x=>x.classList.remove('active'));
          btn.classList.add('active');
          ST.market = btn.getAttribute('data-m');
          ST.sub = 'all';
          ST.iaCat = 'all';
          ST.league = 'all';
          ST.sortMode = 'score';
          ST.q = '';
          refresh();
        };
      });
    }

    function refreshHeader(){
      const loaded = DATASETS.map(d => `${d.label}: ${(ST[d.key] || []).length}`).join(' • ');
      document.getElementById('hdrInfo').textContent = loaded;
    }

    function refresh(){
      renderUploadGrid();
      buildControls();
      renderRows();
      refreshHeader();
    }

    function init(){
      bindMarketTabs();
      refresh();

      document.addEventListener('keydown', e=>{
        if(e.key === 'Escape') closeDetail();
      });
    }

    init();
  </script>
</body>
</html>
